name: tag

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  tag:
    runs-on: ubuntu-24.04
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch

  base:
    needs: tag
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: images/base
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/base:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/base:${{ needs.tag.outputs.new_tag }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  leaves:
    needs: [tag, base]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image: [terraform, k8s]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          platforms: linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/base:${{ needs.tag.outputs.new_tag }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ needs.tag.outputs.new_tag }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
