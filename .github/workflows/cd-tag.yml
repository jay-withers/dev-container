name: cd-tag

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch

  # Publish runs as a reusable workflow so the same job can be re-triggered
  # manually (workflow_dispatch) against an existing tag if a build fails,
  # without minting a new version.
  publish:
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd-publish.yml
    with:
      version: ${{ needs.tag.outputs.new_tag }}
