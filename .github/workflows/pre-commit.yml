name: pre-commit

on:
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.61.0"

      - name: Install Checkov
        run: pip install checkov==3.2.529

      - name: Install terraform-docs
        run: |
          curl -fsSL https://github.com/terraform-docs/terraform-docs/releases/download/v0.24.0/terraform-docs-v0.24.0-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin terraform-docs

      - name: Install actionlint
        run: |
          curl -fsSL https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin actionlint

      - name: Install gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Install pre-commit
        run: pip install pre-commit==3.7.1

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('config/.pre-commit-config.yaml') }}

      - name: Terraform init
        run: terraform -chdir=terraform init

      - name: Run pre-commit
        env:
          SKIP: no-commit-to-branch
        run: pre-commit run --all-files --config config/.pre-commit-config.yaml
