name: cd-publish

# Builds and publishes every image to GHCR for a given tag. Invoked by cd-tag
# after a version bump, or manually to (re)publish an existing tag.
on:
  workflow_call:
    inputs:
      version:
        description: Git tag to publish (e.g. v1.2.3)
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Existing git tag to publish (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  base:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v7
        with:
          context: images/base
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/base:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/base:${{ inputs.version }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  leaves:
    needs: base
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image: [terraform, k8s]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }} image
        uses: docker/build-push-action@v7
        with:
          context: images/${{ matrix.image }}
          platforms: linux/arm64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/base:${{ inputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ inputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
